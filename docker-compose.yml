services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: notification-system-db
    environment:
      POSTGRES_DB: notification_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - notification-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Database bootstrap to ensure schema/demo data exists even on reused volumes
  db-bootstrap:
    image: postgres:15-alpine
    container_name: notification-system-db-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: password
    volumes:
      - ./database/init:/docker-entrypoint-initdb.d:ro
    command: >
      sh -c "psql -h postgres -U postgres -d notification_system -f /docker-entrypoint-initdb.d/001-bootstrap.sql"
    networks:
      - notification-network
    restart: "no"

  # PostgreSQL web UI
  pgweb:
    image: sosedoff/pgweb
    container_name: notification-system-pgweb
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/notification_system?sslmode=disable
    ports:
      - "8080:8081"
    networks:
      - notification-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: notification-system-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - notification-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notification-system-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notification_system
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_EXPIRES_IN: 30d
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      TELEGRAM_BOT_TOKEN: your-telegram-bot-token
      SLACK_BOT_TOKEN: xoxb-your-slack-bot-token
      SLACK_SIGNING_SECRET: your-slack-signing-secret
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: notification-system-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: notification-system-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - notification-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  notification-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
